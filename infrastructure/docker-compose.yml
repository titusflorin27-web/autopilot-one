services:
  postgres:
    image: postgres:16-alpine
    container_name: autopilot_postgres
    environment:
      POSTGRES_USER: autopilot
      POSTGRES_PASSWORD: autopilot
      POSTGRES_DB: autopilot
    ports:
      - "5432:5432"
    volumes:
      - autopilot_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: autopilot_redis
    ports:
      - "6379:6379"
    volumes:
      - autopilot_redis_data:/data

volumes:
  autopilot_postgres_data:
  autopilot_redis_data:
